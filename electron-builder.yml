appId: dev.gesink.steuerfach
productName: Steuerfach
directories:
  buildResources: build
  output: release
files:
  - out/**
  - resources/**
  - '!**/.DS_Store'
asarUnpack:
  - resources/**
  - '**/*.node'
npmRebuild: true
mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: false
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Office
publish: null
