appId: dev.gesink.belegbar
productName: Belegbar
directories:
  buildResources: build
  output: release
files:
  - out/**
  - resources/**
  - '!**/.DS_Store'
asarUnpack:
  - resources/**
  - '**/*.node'
npmRebuild: true
# arch is driven by CI (one native runner per os × arch); no pins here
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  category: public.app-category.finance
  target: [dmg]
  hardenedRuntime: false
win:
  target: [nsis]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target: [AppImage, deb]
  category: Office
publish: null
