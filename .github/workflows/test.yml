name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit & typecheck (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # unit tests never launch Electron; skip the ~100MB binary download
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

  e2e-smoke:
    name: E2E smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        run: node scripts/ensure-native-abi.mjs electron

      - name: E2E smoke (Linux, headless X server)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx playwright test e2e/smoke.spec.ts

      - name: E2E smoke (macOS)
        if: runner.os == 'macOS'
        run: npx playwright test e2e/smoke.spec.ts

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces-${{ matrix.os }}
          path: test-results/
          retention-days: 7
